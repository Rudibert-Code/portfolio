<section  class="my-projects-container">

    <section class="my-projects-base column nav-bar-padding" id="my-projects">
        <div>
            <h3>My Projetcs</h3>
        </div>
        <section class="my-projects-base column">
            <div class="row bound-left gap">
                @for (project of projects; track $index) {
                    <div (click)="selectProject(project)" class="project-title btn {{project.bonusclass}}" id="{{project.projectID}}">
                        <h4>{{project.title}}</h4>
                    </div>
                }
            </div>
            <section class="project-box">
                <div class="project-details gap">
                    <img class="project-icon" src="/assets/my-skill-highlight.png" alt="">
                    <section class="column">

                        <h4 id="title">Placeholder</h4>
                        <p id="description">Placeholder</p>
                    
                    </section>
                </div>
                <div class="project-details-base gap">
                    <h4>Technologies</h4>
                    <div class="row gap">


                        <div class="project-icon">
                            <img src="/assets/icons/Icons_JavaScript.png" alt="" id="tech_1">
                        </div>

                        <div class="project-icon">
                            <img src="/assets/icons/Icons_HTML.png" alt="" id="tech_2">
                        </div>

                        <div class="project-icon">
                            <img src="/assets/icons/Icons_CSS.png" alt="" id="tech_3">
                        </div>


                    </div>
                    <img class="project-img" src="/assets/projetcs/SpaceBlast.png" alt="" id="project_screenshot">
                    <div class="project-details-mobile gap">
                        <img class="project-icon" src="/assets/my-skill-highlight.png" alt="">
                        <section class="column">
    
                            <h4 id="title">Placeholder</h4>
                            <p id="description">Placeholder</p>
                        
                        </section>
                    </div>
                    <div class="row gap">
                        <button (click)="liveTest()" class="btn btn2">Live Test</button>
                        <button (click)="gitHub()" class="btn btn1">GitHub</button>
                    </div>
                </div>
            </section>
        </section>
    </section>

</section>

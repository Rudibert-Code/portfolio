<section class="parent">
    
    <h3 class="comment_title">Need a teamplayer? Here's what my colleges say about me.</h3>

        <p>Here's what my colleges say about me.</p>
    </div>

    <section class="comment" id="comments">


        <section class="comment_list">

            @for (comment of evaluation; track $index) {
                <div class="comment_container">
                    <h3>{{comment.name}}</h3>
                    <div class="comment_text-area">
                        <span>{{comment.comment}}</span>
                    </div>
                    <a class="btn color-highliht" href="{{comment.link}}">Linked In Profile</a>
                </div>
            }
            
        </section>

    </section>

</section>

<section class="contact-container">

    <section class="column gap nav-bar-padding" id="contact-me">
        <div class="contact-header gap">
            <div></div>
            <h2 class="color-highliht">Contact Me</h2>
            <a class="btn arrow-frame row centered" href="#header">
                <img class="rotate180" src="/assets/Arrow_down.png" alt="">
            </a>
        </div>
        <section class="contact-base">
            <div class="content-box">
                <p class="font-b color-basic">Placeholder text ...</p>
            </div>
            <div class="content-box">
                @for (contact of contacts; track $index) {
                    <div class="contact-data padding">
                        <img src="{{contact.icon}}" alt="">
                        <p>{{contact.info}}</p>
                    </div>
                }
            </div>
        </section>
        <section class="contact-base">
            <div>
                <p class="padding font-b color-highliht" id="contact-name">Your Name</p>
                <input class="content-box input-frame" type="text">
            </div>
            <div>
                <p class="padding font-b color-highliht" id="contact-email">Your Email</p>
                <input class="content-box input-frame" type="text">
            </div>
        </section>
        <section>
            <p class="padding font-b color-highliht" id="contact-message">Your Message</p>
            <input class="content-box-large input-frame" type="text">
        </section>
        <section class="contact-base left">
            <img class="contact-checkbox btn" (click)="checkBox()" src="{{btnCondition}}" alt="">
            <p>I've read the <a class="btn font-b color-highliht" href=""> privacy policy </a> and agree to the processing of my data as outlined.</p>
        </section>
        <section class="contact-base right">
            <button (click)="contactSend()" class="button-inactive" id="btn-send">Send</button>
        </section>
    </section>

</section>

<section class="contact-container">
    <section class="column gap nav-bar-padding" id="contact-me">
        <div class="contact-header gap">
            <div class="contact-title"></div>
            <h2 class="color-highliht">Contact Me</h2>
            <a class="btn arrow-frame row centered contact-title" href="#header">
                <img class="rotate180" src="/assets/Arrow_down.png" alt="">
            </a>
        </div>
        <section class="contact-base column-reverse">
            <div class="content-box">
                <p class="font-b color-basic">Placeholder text ...</p>
            </div>
            <div class="content-box">
                <div class="content-box__email"></div>
                <div class="content-box__tel"></div>
            </div>
        </section>
        <section class="contact-base">
            <div class="input-area">
                <img class="checkmark-position hide" src="/assets/icons/Icons_check.png" alt="" id="name">
                <p class="contact-title padding font-b color-highliht" id="nameValue">Your Name</p>
                <input (keyup)="checkInputValue('contactname')" class="content-box input-frame" type="text" value="" id="contactname">
            </div>
            <div class="input-area">
                <img class="checkmark-position hide" src="/assets/icons/Icons_check.png" alt="" id="email">
                <p class="contact-title padding font-b color-highliht"  id="emailValue">Your Email</p>
                <input (keyup)="checkInputValue('contactemail')" class="content-box input-frame" type="text" value="" id="contactemail">
            </div>
        </section>
        <section class="relative">
            <img class="checkmark-position hide" src="/assets/icons/Icons_check.png" alt="" id="message">
            <p class="contact-title padding font-b color-highliht"  id="messageValue">Your Message</p>
            <input (keyup)="checkInputValue('contactmessage')" class="content-box-large input-frame" type="text" value="" id="contactmessage">
        </section>
        <section class="contact-check left">
            <img class="contact-checkbox btn" (click)="checkBox()" src="{{btnCondition}}" alt="" id="contactCheckboxError">
            <p>I've read the <a class="btn font-b color-highliht" routerLink="PrivacyPolicy"> privacy policy </a> and agree to the processing of my data as outlined.</p>
        </section>
        <section class="contact-base right">
            <button (click)="sendMessage()" class="button-inactive" id="btn-send">Send</button>
        </section>
        <a class="btn arrow-frame row centered arrow-mobile" href="#header">
            <img class="rotate180" src="/assets/Arrow_down.png" alt="">
        </a>
    </section>

</section>
